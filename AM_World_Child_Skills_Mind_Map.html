<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Child Skills Mind Map — A&M World</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:#0f0f12;color:#e8e6df;overflow:hidden;width:100vw;height:100vh}
canvas{display:block;cursor:grab}
canvas:active{cursor:grabbing}
.controls{position:fixed;bottom:16px;right:16px;display:flex;gap:6px;z-index:10}
.controls button{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);color:#e8e6df;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
.controls button:hover{background:rgba(255,255,255,0.15)}
.legend{position:fixed;top:16px;left:16px;display:flex;flex-wrap:wrap;gap:6px;z-index:10;max-width:420px}
.pill{font-size:12px;padding:5px 12px;border-radius:20px;cursor:pointer;border:none;font-family:inherit;font-weight:500;transition:transform .15s,box-shadow .15s}
.pill:hover{transform:scale(1.06);box-shadow:0 2px 12px rgba(0,0,0,0.3)}
.hint{position:fixed;bottom:16px;left:16px;font-size:12px;color:rgba(255,255,255,0.35);z-index:10}
.title-bar{position:fixed;top:16px;right:16px;text-align:right;z-index:10}
.title-bar h1{font-size:16px;font-weight:600;color:rgba(255,255,255,0.7);letter-spacing:-.3px}
.title-bar p{font-size:11px;color:rgba(255,255,255,0.3);margin-top:2px}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div class="legend" id="legend"></div>
<div class="controls">
<button onclick="zoomBy(1.25)" title="Zoom in">+</button>
<button onclick="zoomBy(0.8)" title="Zoom out">−</button>
<button onclick="resetView()" title="Reset">R</button>
<button onclick="expandAll()" title="Expand all">⊕</button>
<button onclick="collapseAll()" title="Collapse all">⊖</button>
</div>
<div class="hint">Scroll to zoom · Drag to pan · Click to expand · Double-click skills for detail</div>
<div class="title-bar"><h1>A&M World — Child Skills Map</h1><p>178 skills · 9 domains · Ages 0–13</p></div>

<script>
const DATA=[
{id:"sensory",t:"Sensory\nprocessing",c:"#9B8FFF",bg:"#2a2640",groups:[
{n:"Vestibular",sk:["Postural security","Bilateral coordination","Muscle tone","Gravitational security","Dynamic balance","Static balance"]},
{n:"Proprioceptive",sk:["Force modulation","Body position sense","Motor planning","Joint awareness"]},
{n:"Tactile",sk:["Tactile discrimination","Temp/pain awareness","Social touch","Texture tolerance"]},
{n:"Visual",sk:["Visual tracking","Figure-ground","Visual closure","Visual-spatial","Visual memory"]},
{n:"Auditory",sk:["Auditory discrimination","Auditory filtering","Sound localisation","Auditory memory","Phonological awareness"]},
{n:"Olfactory",sk:["Scent discrimination","Olfactory memory"]},
{n:"Gustatory",sk:["Oral texture tolerance","Oral-motor strength","Flavour discrimination"]}
]},
{id:"motor",t:"Motor\ndevelopment",c:"#4CD9A0",bg:"#1a3328",groups:[
{n:"Gross motor",sk:["Core strength","Locomotion","Ball skills","Climbing & jumping","Swimming","Endurance"]},
{n:"Fine motor",sk:["Pincer grasp","Pencil grip","Scissors skills","Hand strength","In-hand manipulation","Bilateral hand use"]},
{n:"Visual-motor",sk:["Hand-eye coordination","Copying shapes","Handwriting","Bead threading"]},
{n:"Oral-motor",sk:["Sucking & swallowing","Chewing progression","Cup & straw","Self-feeding"]}
]},
{id:"cognitive",t:"Cognitive\ndevelopment",c:"#5BA8F5",bg:"#1a2a3d",groups:[
{n:"Executive function",sk:["Working memory","Inhibitory control","Cognitive flexibility","Planning","Time management","Metacognition"]},
{n:"Attention",sk:["Sustained attention","Selective attention","Divided attention","Joint attention"]},
{n:"Memory",sk:["Short-term memory","Long-term memory","Procedural memory","Spatial memory"]},
{n:"Logical-math",sk:["Number sense","Pattern recognition","Classification","Cause & effect","Seriation","Spatial reasoning","Measurement","Data literacy"]},
{n:"Problem-solving",sk:["Hypothesis testing","Deductive reasoning","Inductive reasoning","Analogical reasoning","Decision-making","Systems thinking"]},
{n:"Computational",sk:["Decomposition","Abstraction","Algorithm design","Debugging","Prompt design"]}
]},
{id:"language",t:"Language &\ncommunication",c:"#F0885A",bg:"#3a2218",groups:[
{n:"Receptive",sk:["Vocabulary","Following directions","Story comprehension","Inferencing"]},
{n:"Expressive",sk:["First words","Sentences","Narrative skills","Word retrieval","Argumentation"]},
{n:"Pragmatics",sk:["Turn-taking","Topic maintenance","Non-verbal comms","Perspective"]},
{n:"Literacy",sk:["Pre-reading","Phonics","Reading fluency","Comprehension","Writing mechanics","Creative writing"]},
{n:"Multilingual",sk:["Code-switching","Metalinguistic awareness"]}
]},
{id:"social",t:"Social-\nemotional",c:"#F06B95",bg:"#3a1828",groups:[
{n:"Self-awareness",sk:["Emotion ID","Body awareness","Strengths & weaknesses","Self-concept"]},
{n:"Self-regulation",sk:["Emotional regulation","Impulse control","Frustration tolerance","Self-soothing","Delayed gratification"]},
{n:"Social skills",sk:["Attachment","Cooperative play","Sharing","Conflict resolution","Friendship","Group participation","Leadership"]},
{n:"Empathy",sk:["Emotional empathy","Cognitive empathy","Theory of mind","Compassion"]},
{n:"Moral",sk:["Right vs wrong","Honesty","Responsibility","Diversity respect"]},
{n:"Resilience",sk:["Growth mindset","Coping with failure","Adaptability","Optimism"]}
]},
{id:"creative",t:"Creative\ndevelopment",c:"#8BC34A",bg:"#1e2e14",groups:[
{n:"Visual arts",sk:["Drawing & painting","Sculpting","Design thinking","Aesthetic appreciation"]},
{n:"Music",sk:["Rhythm & beat","Singing","Instruments","Music appreciation"]},
{n:"Dramatic play",sk:["Pretend play","Role-playing","Storytelling","Improvisation"]},
{n:"Innovation",sk:["Divergent thinking","Curiosity","Tinkering","Cross-domain"]}
]},
{id:"selfcare",t:"Self-care &\nlife skills",c:"#F5B642",bg:"#3a2e14",groups:[
{n:"Hygiene",sk:["Toileting","Bathing & grooming","Dressing","Health awareness"]},
{n:"Safety",sk:["Stranger safety","Road safety","Water safety","Digital safety","First aid"]},
{n:"Household",sk:["Tidying","Basic cooking","Money concepts","Time-telling","Laundry"]},
{n:"Independence",sk:["Choice-making","Self-advocacy","Travel independence","Goal-setting"]}
]},
{id:"physical",t:"Physical\nhealth",c:"#E85B8A",bg:"#3a1828",groups:[
{n:"Nutrition",sk:["Food groups","Appetite regulation","Adventurous eating"]},
{n:"Sleep",sk:["Sleep routines","Self-settling","Rest & recovery"]},
{n:"Body literacy",sk:["Body parts","Puberty readiness","Fitness awareness"]}
]},
{id:"ai_ready",t:"AI-age\nreadiness",c:"#B08AFF",bg:"#2a2040",groups:[
{n:"Digital literacy",sk:["Device interaction","Info evaluation","Digital creation","AI awareness"]},
{n:"Comp. thinking",sk:["Decomposition","Pattern recognition","Abstraction","Algorithm design"]},
{n:"Human-AI collab",sk:["Prompt design","Output evaluation","Tech ethics","Creative augmentation"]},
{n:"Future-proof",sk:["Learning to learn","Comfort with ambiguity","Collaboration","Entrepreneurial"]}
]}
];

const cv=document.getElementById("cv");
const ctx=cv.getContext("2d");
let W,H,cx,cy,scale=1,ox=0,oy=0,dragging=false,lx,ly,dragMoved=false;
let expanded={};
let hovered=null;
let animProgress={};
let raf;

function resize(){
  const r=devicePixelRatio||1;
  W=window.innerWidth;H=window.innerHeight;
  cv.width=W*r;cv.height=H*r;
  cv.style.width=W+'px';cv.style.height=H+'px';
  ctx.setTransform(r,0,0,r,0,0);
  cx=W/2;cy=H/2;
}

function hexToRgba(hex,a){
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function lerp(a,b,t){return a+(b-a)*t;}

function buildLayout(){
  const nodes=[];
  const N=DATA.length;
  const baseR1=160*Math.min(1,Math.max(0.7,W/1200));
  const R2=110;
  const R3=65;

  nodes.push({type:'center',x:0,y:0,r:50,label:'Child skills\n0–13 years\n178 skills',color:'#fff'});

  DATA.forEach((d,i)=>{
    const a=(i/N)*Math.PI*2 - Math.PI/2;
    const dx=Math.cos(a)*baseR1, dy=Math.sin(a)*baseR1;
    nodes.push({type:'domain',id:d.id,x:dx,y:dy,r:38,label:d.t,color:d.c,bg:d.bg,angle:a});

    const gProg=animProgress[d.id]||0;
    if(gProg>0.01){
      const gN=d.groups.length;
      const spread=Math.min(0.65, 1.1/gN);
      d.groups.forEach((g,gi)=>{
        const ga=a + (gi - (gN-1)/2)*spread;
        const dist=R2*gProg;
        const gx=dx+Math.cos(ga)*dist, gy=dy+Math.sin(ga)*dist;
        const groupId=d.id+'_'+gi;
        nodes.push({type:'group',id:groupId,domainId:d.id,x:gx,y:gy,r:26*gProg,label:g.n,color:d.c,bg:d.bg,angle:ga,parentX:dx,parentY:dy,opacity:gProg});

        const sProg=animProgress[groupId]||0;
        if(sProg>0.01){
          const sN=g.sk.length;
          const sspread=Math.min(0.4, 0.85/sN);
          g.sk.forEach((s,si)=>{
            const sa=ga + (si - (sN-1)/2)*sspread;
            const sDist=R3*sProg;
            const sx=gx+Math.cos(sa)*sDist, sy=gy+Math.sin(sa)*sDist;
            nodes.push({type:'skill',id:groupId+'_'+si,groupId,x:sx,y:sy,r:18*sProg,label:s,color:d.c,bg:d.bg,angle:sa,parentX:gx,parentY:gy,opacity:sProg,skillName:s});
          });
        }
      });
    }
  });
  return nodes;
}

function worldToScreen(wx,wy){return [cx+ox+wx*scale, cy+oy+wy*scale];}
function screenToWorld(sx,sy){return [(sx-cx-ox)/scale, (sy-cy-oy)/scale];}

function draw(){
  ctx.clearRect(0,0,W,H);
  const nodes=buildLayout();

  // Draw connections
  nodes.forEach(n=>{
    if(n.type==='center') return;
    let px=0,py=0;
    if(n.type==='domain'){px=0;py=0;}
    else{px=n.parentX;py=n.parentY;}
    const [sx,sy]=worldToScreen(n.x,n.y);
    const [spx,spy]=worldToScreen(px,py);
    const op=n.opacity!==undefined?n.opacity:1;

    ctx.beginPath();
    const midX=(spx+sx)/2, midY=(spy+sy)/2;
    const off=n.type==='domain'?12:6;
    ctx.moveTo(spx,spy);
    ctx.quadraticCurveTo(midX+off,midY-off,sx,sy);
    ctx.strokeStyle=hexToRgba(n.color,0.15*op);
    ctx.lineWidth=n.type==='skill'?1:n.type==='group'?1.5:2;
    ctx.stroke();
  });

  // Draw nodes (back to front)
  nodes.forEach(n=>{
    const [sx,sy]=worldToScreen(n.x,n.y);
    const sr=n.r*scale;
    if(sr<2) return;
    const isHov=hovered===n.id;
    const op=n.opacity!==undefined?n.opacity:1;

    ctx.save();
    ctx.globalAlpha=op;

    if(n.type==='center'){
      // Outer glow ring
      ctx.beginPath();ctx.arc(sx,sy,sr+6,0,Math.PI*2);
      ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=8;ctx.stroke();

      ctx.beginPath();ctx.arc(sx,sy,sr,0,Math.PI*2);
      ctx.fillStyle='#1a1a1f';ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=1.5;ctx.stroke();

      const lines=n.label.split('\n');
      lines.forEach((l,li)=>{
        ctx.font=li===2?`${Math.max(10,10*scale)}px 'DM Sans',sans-serif`:`600 ${Math.max(12,12*scale)}px 'DM Sans',sans-serif`;
        ctx.fillStyle=li===2?'rgba(255,255,255,0.4)':'rgba(255,255,255,0.9)';
        ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText(l,sx,sy+(li-1)*Math.max(15,15*scale));
      });
      ctx.restore();
      return;
    }

    // Node circle
    ctx.beginPath();ctx.arc(sx,sy,sr+(isHov?3:0),0,Math.PI*2);

    if(n.type==='domain'){
      ctx.fillStyle=isHov?n.color:n.bg;
      ctx.fill();
      ctx.strokeStyle=hexToRgba(n.color,isHov?0.9:0.5);
      ctx.lineWidth=isHov?2:1;
      ctx.stroke();
      if(expanded[n.id]){
        ctx.beginPath();ctx.arc(sx,sy,sr+6,0,Math.PI*2);
        ctx.strokeStyle=hexToRgba(n.color,0.12);ctx.lineWidth=4;ctx.stroke();
      }
    } else if(n.type==='group'){
      ctx.fillStyle=isHov?hexToRgba(n.color,0.3):hexToRgba(n.color,0.1);
      ctx.fill();
      ctx.strokeStyle=hexToRgba(n.color,isHov?0.6:0.25);
      ctx.lineWidth=0.5;ctx.stroke();
    } else {
      ctx.fillStyle=isHov?hexToRgba(n.color,0.25):hexToRgba(n.color,0.07);
      ctx.fill();
      ctx.strokeStyle=hexToRgba(n.color,isHov?0.5:0.15);
      ctx.lineWidth=0.5;ctx.stroke();
    }

    // Text
    const maxW=sr*1.7;
    const fs=n.type==='domain'?Math.max(11,11*scale):n.type==='group'?Math.max(9.5,9.5*scale):Math.max(8.5,8.5*scale);
    ctx.font=(n.type==='skill'?'400 ':'500 ')+fs+'px "DM Sans",sans-serif';
    ctx.fillStyle=isHov?'#fff':n.type==='skill'?'rgba(255,255,255,0.7)':n.color;
    ctx.textAlign='center';ctx.textBaseline='middle';

    const text=n.label;
    const rawLines=text.split('\n');
    let lines=[];
    rawLines.forEach(rl=>{
      const words=rl.split(' ');
      let cur=words[0]||'';
      for(let w=1;w<words.length;w++){
        const test=cur+' '+words[w];
        if(ctx.measureText(test).width>maxW){lines.push(cur);cur=words[w];}
        else cur=test;
      }
      lines.push(cur);
    });
    if(lines.length>3) lines=lines.slice(0,3);
    const lh=fs*1.25;
    lines.forEach((l,li)=>{
      ctx.fillText(l,sx,sy+(li-(lines.length-1)/2)*lh);
    });

    ctx.restore();
  });

  // Animate
  let needsAnim=false;
  Object.keys(expanded).forEach(k=>{
    if(!animProgress[k]) animProgress[k]=0;
    if(animProgress[k]<1){animProgress[k]=Math.min(1,animProgress[k]+0.08);needsAnim=true;}
  });
  Object.keys(animProgress).forEach(k=>{
    if(!expanded[k]&&animProgress[k]>0){animProgress[k]=Math.max(0,animProgress[k]-0.1);needsAnim=true;if(animProgress[k]<=0) delete animProgress[k];}
  });
  if(needsAnim) raf=requestAnimationFrame(draw);
}

function startAnim(){cancelAnimationFrame(raf);raf=requestAnimationFrame(draw);}

function hitTest(mx,my){
  const nodes=buildLayout();
  const [wx,wy]=screenToWorld(mx,my);
  for(let i=nodes.length-1;i>=0;i--){
    const n=nodes[i];
    const dx=wx-n.x,dy=wy-n.y;
    if(dx*dx+dy*dy<(n.r+6)*(n.r+6)) return n;
  }
  return null;
}

cv.addEventListener('mousedown',e=>{dragging=true;dragMoved=false;lx=e.clientX;ly=e.clientY;});
cv.addEventListener('mousemove',e=>{
  if(dragging){
    const dx=e.clientX-lx,dy=e.clientY-ly;
    if(Math.abs(dx)>2||Math.abs(dy)>2) dragMoved=true;
    ox+=dx;oy+=dy;
    lx=e.clientX;ly=e.clientY;
    draw();
  } else {
    const n=hitTest(e.clientX,e.clientY);
    const newH=n?n.id:null;
    if(newH!==hovered){hovered=newH;draw();}
    cv.style.cursor=n?'pointer':'grab';
  }
});
cv.addEventListener('mouseup',e=>{
  if(!dragMoved){
    const n=hitTest(e.clientX,e.clientY);
    if(n){
      if(n.type==='domain'){
        if(expanded[n.id]) delete expanded[n.id]; else expanded[n.id]=true;
        Object.keys(expanded).forEach(k=>{if(k.startsWith(n.id+'_')&&!expanded[n.id]) delete expanded[k];});
      } else if(n.type==='group'){
        if(expanded[n.id]) delete expanded[n.id]; else expanded[n.id]=true;
      }
      startAnim();
    }
  }
  dragging=false;
});
cv.addEventListener('mouseleave',()=>{dragging=false;hovered=null;draw();});

cv.addEventListener('wheel',e=>{
  e.preventDefault();
  const [wx,wy]=screenToWorld(e.clientX,e.clientY);
  const f=e.deltaY<0?1.12:0.89;
  scale=Math.max(0.25,Math.min(5,scale*f));
  ox=e.clientX-cx-wx*scale;
  oy=e.clientY-cy-wy*scale;
  draw();
},{passive:false});

// Touch support
let touchDist=0,touchScale=1;
cv.addEventListener('touchstart',e=>{
  if(e.touches.length===1){dragging=true;dragMoved=false;lx=e.touches[0].clientX;ly=e.touches[0].clientY;}
  if(e.touches.length===2){
    const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;
    touchDist=Math.sqrt(dx*dx+dy*dy);touchScale=scale;
  }
},{passive:true});
cv.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1&&dragging){
    const dx=e.touches[0].clientX-lx,dy=e.touches[0].clientY-ly;
    if(Math.abs(dx)>2||Math.abs(dy)>2) dragMoved=true;
    ox+=dx;oy+=dy;lx=e.touches[0].clientX;ly=e.touches[0].clientY;draw();
  }
  if(e.touches.length===2){
    const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;
    scale=Math.max(0.25,Math.min(5,touchScale*(Math.sqrt(dx*dx+dy*dy)/touchDist)));draw();
  }
},{passive:false});
cv.addEventListener('touchend',e=>{
  if(e.changedTouches.length===1&&!dragMoved){
    const n=hitTest(e.changedTouches[0].clientX,e.changedTouches[0].clientY);
    if(n){
      if(n.type==='domain'){if(expanded[n.id]) delete expanded[n.id]; else expanded[n.id]=true;Object.keys(expanded).forEach(k=>{if(k.startsWith(n.id+'_')&&!expanded[n.id]) delete expanded[k];});}
      else if(n.type==='group'){if(expanded[n.id]) delete expanded[n.id]; else expanded[n.id]=true;}
      startAnim();
    }
  }
  dragging=false;
});

function zoomBy(f){scale=Math.max(0.25,Math.min(5,scale*f));draw();}
function resetView(){scale=1;ox=0;oy=0;Object.keys(expanded).forEach(k=>delete expanded[k]);Object.keys(animProgress).forEach(k=>delete animProgress[k]);draw();}
function expandAll(){DATA.forEach(d=>{expanded[d.id]=true;d.groups.forEach((g,gi)=>{expanded[d.id+'_'+gi]=true;});});startAnim();}
function collapseAll(){Object.keys(expanded).forEach(k=>delete expanded[k]);startAnim();}

// Legend pills
const leg=document.getElementById('legend');
DATA.forEach(d=>{
  const p=document.createElement('button');
  p.className='pill';
  p.style.cssText=`background:${d.bg};color:${d.c}`;
  p.textContent=d.t.replace('\n',' ');
  p.onclick=()=>{if(expanded[d.id]) delete expanded[d.id]; else expanded[d.id]=true;Object.keys(expanded).forEach(k=>{if(k.startsWith(d.id+'_')&&!expanded[d.id]) delete expanded[k];});startAnim();};
  leg.appendChild(p);
});

resize();
draw();
window.addEventListener('resize',()=>{resize();draw();});
</script>
</body>
</html>

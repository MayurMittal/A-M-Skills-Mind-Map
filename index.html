<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Child Skills Mind Map — A&M World</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:#0f0f12;overflow:hidden;width:100vw;height:100vh}
svg{display:block;width:100vw;height:100vh}
.link{stroke-opacity:.25;fill:none}
.node-circle{cursor:pointer;transition:filter .15s}
.node-circle:hover{filter:brightness(1.3)}
.label{fill:#ccc;pointer-events:none;font-family:'DM Sans',sans-serif}
.label-domain{fill:#fff;font-weight:600;font-size:13px}
.label-group{font-weight:500;font-size:11px}
.label-skill{font-weight:400;font-size:9.5px;fill:rgba(255,255,255,.7)}
.label-center{fill:#fff;font-weight:600;font-size:14px}
.label-center-sub{fill:rgba(255,255,255,.4);font-weight:400;font-size:10px}
.controls{position:fixed;bottom:16px;right:16px;display:flex;gap:6px;z-index:10}
.controls button{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:#e8e6df;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit}
.controls button:hover{background:rgba(255,255,255,.16)}
.legend{position:fixed;top:14px;left:14px;display:flex;flex-wrap:wrap;gap:5px;z-index:10;max-width:420px}
.pill{font-size:11px;padding:4px 10px;border-radius:20px;cursor:pointer;border:none;font-family:inherit;font-weight:500;white-space:nowrap;transition:transform .15s}
.pill:hover{transform:scale(1.06)}
.hint{position:fixed;bottom:16px;left:16px;font-size:11px;color:rgba(255,255,255,.28);z-index:10;line-height:1.7}
.title-bar{position:fixed;top:14px;right:14px;text-align:right;z-index:10}
.title-bar h1{font-size:14px;font-weight:600;color:rgba(255,255,255,.55)}
.title-bar p{font-size:11px;color:rgba(255,255,255,.22);margin-top:2px}
</style>
</head>
<body>
<svg id="svg"></svg>
<div class="legend" id="legend"></div>
<div class="controls">
  <button onclick="resetZoom()">R</button>
  <button onclick="expandAllDomains()" style="font-size:11px">All</button>
  <button onclick="collapseAllDomains()" style="font-size:11px">−All</button>
</div>
<div class="hint">Scroll to zoom · Drag to pan<br>Click domain to expand · Click sub-domain to see skills</div>
<div class="title-bar"><h1>A&M World — Child Skills Map</h1><p>178 skills · 9 domains · Ages 0–13</p></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script>
const DATA=[
{id:"sensory",t:"Sensory processing",c:"#9B8FFF",bg:"#3a3560",groups:[
  {n:"Vestibular",sk:["Postural security","Bilateral coord.","Muscle tone","Gravitational security","Dynamic balance","Static balance"]},
  {n:"Proprioceptive",sk:["Force modulation","Body position","Motor planning","Joint awareness"]},
  {n:"Tactile",sk:["Tactile discrim.","Temp/pain","Social touch","Texture tolerance"]},
  {n:"Visual",sk:["Visual tracking","Figure-ground","Visual closure","Visual-spatial","Visual memory"]},
  {n:"Auditory",sk:["Discrimination","Filtering","Localisation","Auditory memory","Phonological"]},
  {n:"Olfactory",sk:["Scent discrim.","Olfactory memory"]},
  {n:"Gustatory",sk:["Oral texture","Oral-motor","Flavour discrim."]}
]},
{id:"motor",t:"Motor development",c:"#3DD6A0",bg:"#1a4432",groups:[
  {n:"Gross motor",sk:["Core strength","Locomotion","Ball skills","Climbing","Swimming","Endurance"]},
  {n:"Fine motor",sk:["Pincer grasp","Pencil grip","Scissors","Hand strength","In-hand manip.","Bilateral hands"]},
  {n:"Visual-motor",sk:["Hand-eye coord.","Copying shapes","Handwriting","Bead threading"]},
  {n:"Oral-motor",sk:["Sucking/swallow","Chewing","Cup & straw","Self-feeding"]}
]},
{id:"cognitive",t:"Cognitive development",c:"#5BA8F5",bg:"#1a3050",groups:[
  {n:"Executive fn",sk:["Working memory","Inhibitory ctrl","Flexibility","Planning","Time mgmt","Metacognition"]},
  {n:"Attention",sk:["Sustained","Selective","Divided","Joint attention"]},
  {n:"Memory",sk:["Short-term","Long-term","Procedural","Spatial memory"]},
  {n:"Logical-math",sk:["Number sense","Patterns","Classification","Cause & effect","Seriation","Spatial reasoning","Measurement","Data literacy"]},
  {n:"Problem-solving",sk:["Hypothesis test","Deductive","Inductive","Analogical","Decision-making","Systems thinking"]},
  {n:"Computational",sk:["Decomposition","Abstraction","Algorithm design","Debugging","Prompt design"]}
]},
{id:"language",t:"Language & comms",c:"#F0885A",bg:"#4a2a12",groups:[
  {n:"Receptive",sk:["Vocabulary","Follow directions","Story compreh.","Inferencing"]},
  {n:"Expressive",sk:["First words","Sentences","Narrative","Word retrieval","Argumentation"]},
  {n:"Pragmatics",sk:["Turn-taking","Topic maint.","Non-verbal","Perspective"]},
  {n:"Literacy",sk:["Pre-reading","Phonics","Fluency","Comprehension","Writing","Creative writing"]},
  {n:"Multilingual",sk:["Code-switching","Metalinguistic"]}
]},
{id:"social",t:"Social-emotional",c:"#F06B95",bg:"#4a1a30",groups:[
  {n:"Self-awareness",sk:["Emotion ID","Body awareness","Strengths/weak.","Self-concept"]},
  {n:"Self-regulation",sk:["Emotional reg.","Impulse control","Frustration tol.","Self-soothing","Delayed gratif."]},
  {n:"Social skills",sk:["Attachment","Coop. play","Sharing","Conflict resol.","Friendship","Leadership"]},
  {n:"Empathy",sk:["Emotional","Cognitive","Theory of mind","Compassion"]},
  {n:"Moral",sk:["Right vs wrong","Honesty","Responsibility","Diversity"]},
  {n:"Resilience",sk:["Growth mindset","Cope w/ failure","Adaptability","Optimism"]}
]},
{id:"creative",t:"Creative development",c:"#8BC34A",bg:"#224010",groups:[
  {n:"Visual arts",sk:["Drawing/painting","Sculpting","Design thinking","Aesthetics"]},
  {n:"Music",sk:["Rhythm & beat","Singing","Instruments","Appreciation"]},
  {n:"Dramatic play",sk:["Pretend play","Role-playing","Storytelling","Improvisation"]},
  {n:"Innovation",sk:["Divergent think.","Curiosity","Tinkering","Cross-domain"]}
]},
{id:"selfcare",t:"Self-care & life",c:"#F5B642",bg:"#403010",groups:[
  {n:"Hygiene",sk:["Toileting","Grooming","Dressing","Health aware."]},
  {n:"Safety",sk:["Stranger","Road","Water","Digital","First aid"]},
  {n:"Household",sk:["Tidying","Cooking","Money","Time-telling","Laundry"]},
  {n:"Independence",sk:["Choice-making","Self-advocacy","Travel indep.","Goal-setting"]}
]},
{id:"physical",t:"Physical health",c:"#E8608A",bg:"#3e1528",groups:[
  {n:"Nutrition",sk:["Food groups","Appetite reg.","Adventurous eating"]},
  {n:"Sleep & rest",sk:["Sleep routines","Self-settling","Rest & recovery"]},
  {n:"Body literacy",sk:["Body parts","Puberty ready","Fitness aware."]}
]},
{id:"ai_ready",t:"AI-age readiness",c:"#B08AFF",bg:"#2e1e50",groups:[
  {n:"Digital literacy",sk:["Device interact.","Info evaluation","Digital creation","AI awareness"]},
  {n:"Comp. thinking",sk:["Decomposition","Pattern recog.","Abstraction","Algorithm design"]},
  {n:"Human-AI collab",sk:["Prompt design","Output eval.","Tech ethics","Creative augment."]},
  {n:"Future-proof",sk:["Learn to learn","Ambiguity OK","Collaboration","Entrepreneurial"]}
]}
];

const W=window.innerWidth, H=window.innerHeight;
const svg=d3.select("#svg");
const g=svg.append("g");

// Zoom
const zoom=d3.zoom().scaleExtent([0.15,4]).on("zoom",e=>g.attr("transform",e.transform));
svg.call(zoom);
svg.call(zoom.transform, d3.zoomIdentity.translate(W/2,H/2).scale(0.65));

// State
let nodes=[], links=[], expanded={};
const simulation=d3.forceSimulation();

function buildGraph(){
  nodes=[]; links=[];
  // Center
  nodes.push({id:"__center",type:"center",label:"Child skills\n0–13 yrs",r:52,color:"#fff",fx:0,fy:0});

  const N=DATA.length;
  DATA.forEach((d,i)=>{
    const a=(i/N)*Math.PI*2-Math.PI/2;
    const did=d.id;
    nodes.push({id:did,type:"domain",label:d.t,r:36,color:d.c,bg:d.bg,
      x:Math.cos(a)*240,y:Math.sin(a)*240});
    links.push({source:"__center",target:did,color:d.c});

    if(!expanded[did]) return;

    const gN=d.groups.length;
    d.groups.forEach((gr,gi)=>{
      const ga=a+((gi-(gN-1)/2)*0.55);
      const gid=did+"_"+gi;
      nodes.push({id:gid,type:"group",label:gr.n,r:24,color:d.c,bg:d.bg,domainId:did,
        x:Math.cos(ga)*480+Math.cos(a)*240,y:Math.sin(ga)*480+Math.sin(a)*240});
      links.push({source:did,target:gid,color:d.c});

      if(!expanded[gid]) return;

      const sN=gr.sk.length;
      gr.sk.forEach((sk,si)=>{
        const sa=ga+((si-(sN-1)/2)*0.38);
        const sid=gid+"_"+si;
        nodes.push({id:sid,type:"skill",label:sk,r:16,color:d.c,bg:d.bg,groupId:gid,
          x:Math.cos(sa)*200+nodes.find(n2=>n2.id===gid).x,
          y:Math.sin(sa)*200+nodes.find(n2=>n2.id===gid).y});
        links.push({source:gid,target:sid,color:d.c});
      });
    });
  });
}

function updateVis(){
  buildGraph();

  // Links
  const linkSel=g.selectAll(".link").data(links,d=>d.source.id?d.source.id+"-"+d.target.id:d.source+"-"+d.target);
  linkSel.exit().transition().duration(300).style("stroke-opacity",0).remove();
  const linkE=linkSel.enter().append("line").attr("class","link")
    .style("stroke",d=>d.color).style("stroke-width",d=>{
      const t=typeof d.target==="string"?d.target:d.target.id;
      if(t.split("_").length>=2) return 1;
      if(DATA.some(dd=>dd.id===t)) return 2;
      return 1.5;
    }).style("stroke-opacity",0);
  linkE.transition().duration(400).style("stroke-opacity",.22);
  const linkAll=linkE.merge(linkSel);

  // Nodes
  const nodeSel=g.selectAll(".node-g").data(nodes,d=>d.id);
  nodeSel.exit().transition().duration(300).style("opacity",0).remove();

  const nodeE=nodeSel.enter().append("g").attr("class","node-g").style("opacity",0)
    .on("click",(ev,d)=>{
      if(d.type==="domain"||d.type==="group"){
        if(expanded[d.id]){
          delete expanded[d.id];
          // collapse children
          Object.keys(expanded).forEach(k=>{if(k.startsWith(d.id+"_"))delete expanded[k];});
        } else expanded[d.id]=true;
        updateVis();
      }
    });

  nodeE.append("circle").attr("class","node-circle");
  nodeE.append("text").attr("class","label");

  nodeE.transition().duration(400).style("opacity",1);
  const nodeAll=nodeE.merge(nodeSel);

  // Update circles
  nodeAll.select("circle")
    .attr("r",d=>d.r)
    .attr("fill",d=>{
      if(d.type==="center") return "#1c1c22";
      if(d.type==="domain") return d.bg;
      if(d.type==="group") return d.bg||"rgba(255,255,255,.06)";
      return "rgba(255,255,255,.04)";
    })
    .attr("stroke",d=>d.type==="center"?"rgba(255,255,255,.2)":d.color)
    .attr("stroke-width",d=>d.type==="center"?1.5:d.type==="domain"?(expanded[d.id]?2.5:1.2):.7)
    .attr("stroke-opacity",d=>d.type==="skill"?.35:d.type==="group"?.5:.7);

  // Update labels — positioned OUTSIDE nodes to avoid overflow
  nodeAll.select("text").each(function(d){
    const el=d3.select(this);
    el.selectAll("tspan").remove();
    el.attr("class","label "+(d.type==="center"?"label-center":d.type==="domain"?"label-domain":d.type==="group"?"label-group":"label-skill"))
      .style("fill",d.type==="center"?"#fff":d.type==="domain"?d.color:d.type==="group"?d.color:"rgba(255,255,255,.7)");

    if(d.type==="center"){
      el.attr("text-anchor","middle");
      el.append("tspan").attr("x",0).attr("dy","-0.5em").text("Child skills");
      el.append("tspan").attr("x",0).attr("dy","1.3em").text("0–13 yrs");
      el.append("tspan").attr("x",0).attr("dy","1.3em").attr("class","label-center-sub").text("178 skills");
    } else {
      // Label outside the circle
      el.attr("text-anchor","middle").attr("dy","0.35em").text(d.label);
    }
  });

  // Simulation
  simulation.nodes(nodes);
  simulation.force("link",d3.forceLink(links).id(d=>d.id).distance(d=>{
    const t=typeof d.target==="string"?d.target:d.target.id;
    const s=typeof d.source==="string"?d.source:d.source.id;
    if(s==="__center") return 260;
    if(t.split("_").length===1) return 260; // domain to center
    if(t.split("_").length===2) return 180; // group from domain
    return 140; // skill from group
  }).strength(.6));
  simulation.force("charge",d3.forceManyBody().strength(d=>d.type==="center"?-800:d.type==="domain"?-500:d.type==="group"?-300:-150));
  simulation.force("collision",d3.forceCollide().radius(d=>d.r+18).strength(.9));
  simulation.force("x",d3.forceX(0).strength(.02));
  simulation.force("y",d3.forceY(0).strength(.02));

  simulation.alpha(0.8).restart();

  simulation.on("tick",()=>{
    linkAll
      .attr("x1",d=>d.source.x).attr("y1",d=>d.source.y)
      .attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);

    nodeAll.attr("transform",d=>`translate(${d.x},${d.y})`);

    // Position labels outside circles
    nodeAll.select("text").each(function(d){
      if(d.type==="center") return;
      const el=d3.select(this);
      // Place label below the circle
      el.attr("y", d.r + 14);
    });
  });
}

// Legend
const leg=document.getElementById("legend");
DATA.forEach(d=>{
  const p=document.createElement("button");
  p.className="pill";
  p.style.cssText=`background:${d.bg};color:${d.c}`;
  p.textContent=d.t;
  p.onclick=()=>{
    if(expanded[d.id]){
      delete expanded[d.id];
      Object.keys(expanded).forEach(k=>{if(k.startsWith(d.id+"_"))delete expanded[k];});
    } else expanded[d.id]=true;
    updateVis();
  };
  leg.appendChild(p);
});

function resetZoom(){
  svg.transition().duration(500).call(zoom.transform,d3.zoomIdentity.translate(W/2,H/2).scale(0.65));
}
function expandAllDomains(){
  DATA.forEach(d=>{expanded[d.id]=true;d.groups.forEach((g2,gi)=>{expanded[d.id+"_"+gi]=true;});});
  updateVis();
}
function collapseAllDomains(){
  Object.keys(expanded).forEach(k=>delete expanded[k]);
  updateVis();
}

updateVis();
</script>
</body>
</html>
